name: terraform-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: fmt · validate · lint · scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      - name: terraform fmt (check)
        run: terraform fmt -check -recursive

      - name: terraform init (root, no backend)
        run: terraform init -backend=false

      - name: terraform validate (root)
        run: terraform validate

      - name: terraform validate (examples)
        run: |
          for dir in examples/*/; do
            echo "::group::validate $dir"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
            echo "::endgroup::"
          done

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --format compact

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          soft_fail: true

  lambda-lint:
    name: lambda syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check Lambda handlers
        run: |
          for f in lambda/*/index.mjs; do
            echo "checking $f"
            node --check "$f"
          done
